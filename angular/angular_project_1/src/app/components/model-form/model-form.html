<h3 class="text-center">Let's learn Reactive Form</h3>

<div class="col-sm-5 offset-3 border border-3 rounded-3 p-3">
  <form [formGroup]="registerForm" (submit)="submitMyForm(registerForm)">
    <p>
      FirstName: <input formControlName="firstName" required />
      @if(registerForm.controls['firstName'].hasError('required')){
         <div class="text-danger">FirstName is required</div>
      }
    </p>
    <p>
      lastName: <input formControlName="lastName" />
    </p>
    <p>
      email: <input formControlName="email" />
    </p>
    <div formGroupName="address">
      <p>City: <input formControlName="city"></p>
      <p>State: <input formControlName="state"></p>
      <p>Pincode: <input formControlName="pincode"></p>
    </div>

    <input type="reset" value="Reset" class="mx-2">
    <input type="submit" value="Submit" [disabled]="registerForm.invalid">
  </form>

  <pre>
    {{registerForm.value | json}}
  </pre>
</div>
