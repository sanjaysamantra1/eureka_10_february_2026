<h3 class="text-center">Product List</h3>

<div class="container">
  <div class="row">
    @for (prod of productArr | paginate: { itemsPerPage: 4, currentPage: p}; track $index) {
      <div class="col-sm-3 card">
        <img src="{{prod.image}}" class="card-img-top" alt="..." height="200px">
        <div class="card-body text-center">
          <h5 class="card-title">{{prod.category}}</h5>
          <p class="card-text text-truncate">{{prod.title}}</p>
          <p class="card-text text-truncate">{{prod.description}}</p>
          <p class="card-text">{{prod.price}}</p>
          <p class="card-text">
            {{prod.rating.rate}}
            <fa-icon [icon]='faStar'></fa-icon>
          </p>
          <a href="#" class="btn btn-primary">Details</a>
        </div>
      </div>
    }
  </div>
  <div class='row mt-2'>
    <div class='col-sm-5 offset-3'>
      <pagination-controls (pageChange)="p = $event"></pagination-controls>
    </div>
  </div>
</div>
