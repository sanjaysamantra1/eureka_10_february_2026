<button (click)="openAlert()" class="mx-2 btn btn-primary">Sweet Alert</button>
<button (click)="openSnackBar()" class="mx-2 btn btn-success">Snackbar</button>

<h3 class="text-center">Product List</h3>
<div class="container mt-2">
  <div class="row">
    <div class="col-sm-3">
      <select (change)="filterProducts($event)" class="form-control">
        @for (category of categorySet; track $index) {
          <option>{{category}}</option>
        }
      </select>
    </div>
    <div class="col-sm-6">
      <input type="search" class="form-control" placeholder="Search..." (input)="searchProducts($event)" />
    </div>
    <div class="col-sm-3">
      <button class="btn btn-primary" (click)="sortAsc()">Sort Asc</button>
      <button class="btn btn-secondary mx-1" (click)="sortDesc()">Sort Desc</button>
    </div>
  </div>
  <div class="row mt-2">
    @for (prod of productArr | paginate: { itemsPerPage: 4, currentPage: p}; track $index) {
    <div class="col-sm-3 card">
      <img src="{{prod.image}}" class="card-img-top" alt="..." height="200px">
      <div class="card-body text-center">
        <h5 class="card-title">{{prod.category}}</h5>
        <p class="card-text text-truncate">{{prod.title}}</p>
        <p class="card-text text-truncate">{{prod.description}}</p>
        <p class="card-text">{{prod.price}}</p>
        <p class="card-text">
          {{prod.rating.rate}}
          <fa-icon [icon]='faStar'></fa-icon>
        </p>
        <a href="#" class="btn btn-primary">Details</a>
      </div>
    </div>
    }
  </div>
  <div class='row mt-2'>
    <div class='col-sm-5 offset-3'>
      <pagination-controls (pageChange)="p = $event"></pagination-controls>
    </div>
  </div>
</div>
